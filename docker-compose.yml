services:
  # 0. Base Image Factory Layer (Build-only, hidden from runtime up/start commands)
  base:
    build:
      context: .
      dockerfile: Dockerfile.base
    image: led-controller-base:latest
    container_name: led_base_builder
    command: ["echo", "Base image verified locally."]
    profiles:
      - build-only

  # 1. Apache Frontend Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: web
    ports:
      - "80:80"
    volumes:
      - led_data:/led_controller/data
      - led_images:/var/www/led_controller/images
      - redis_socket:/run/redis
    depends_on:
      - redis
    environment:
      - REDIS_SOCK=/run/redis/redis.sock
    restart: unless-stopped

  # 2. Sun Tracker Worker
  sun-tracker:
    build:
      context: .
      dockerfile: Dockerfile.sun_tracker
    container_name: sun-tracker
    volumes:
      - redis_socket:/run/redis
    depends_on:
      - redis
    environment:
      - REDIS_SOCK=/run/redis/redis.sock
    restart: unless-stopped

  # 3. Movie Processing Worker
  movie-to-artnet-data-worker:
    build:
      context: .
      dockerfile: Dockerfile.movie_to_artnet_data_worker
    container_name: movie-to-artnet-data-worker
    volumes:
      - led_data:/led_controller/data
      - led_images:/var/www/led_controller/images
      - redis_socket:/run/redis
    depends_on:
      - redis
    environment:
      - REDIS_SOCK=/run/redis/redis.sock
    restart: unless-stopped

  # 4. Artnet Live Sender Service
  send-artnet-data:
    build:
      context: .
      dockerfile: Dockerfile.send_artnet_data
    container_name: send_artnet_data
    volumes:
      - led_data:/led_controller/data
      - redis_socket:/run/redis
    depends_on:
      - redis
    environment:
      - REDIS_SOCK=/run/redis/redis.sock
    restart: unless-stopped

  # 5. Artnet Daemon Context (Exposes UDP Port 6454)
  artnetd:
    build:
      context: .
      dockerfile: Dockerfile.artnetd
    container_name: artnetd
    ports:
      - "6454:6454/udp"
    volumes:
      - redis_socket:/run/redis
    depends_on:
      - redis
    environment:
      - REDIS_SOCK=/run/redis/redis.sock
    restart: unless-stopped

  # 6. Artnet Listener (Exposes UDP Port 6454 if needed alternately)
  artnet-listener:
    build:
      context: .
      dockerfile: Dockerfile.artnet_listener
    container_name: artnet-listener
    volumes:
      - redis_socket:/run/redis
    depends_on:
      - redis
    environment:
      - REDIS_SOCK=/run/redis/redis.sock
    restart: unless-stopped

  # Redis Datastore Container
  redis:
    image: redis:7.4-alpine
    container_name: redis
    command: redis-server --port 0 --unixsocket /data/redis.sock --unixsocketperm 777 --save "" --appendonly no
    volumes:
      - redis_socket:/data
    restart: unless-stopped

volumes:
  led_data:
  led_images:
  redis_socket:
